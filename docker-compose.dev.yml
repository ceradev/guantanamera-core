services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guantanamera_core}
      POSTGRES_USER: ${POSTGRES_USER:-your_db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_db_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  api-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: guantanamera-api-dev
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-your_db_user}:${POSTGRES_PASSWORD:-your_db_password}@postgres:5432/${POSTGRES_DB:-guantanamera_core}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-${NEXT_PUBLIC_ADMIN_API_KEY:-your-secure-api-key}}
      - JWT_SECRET=${JWT_SECRET:-your-secure-jwt-secret-at-least-32-chars}
      - SENTRY_DSN=${SENTRY_DSN}
    command: sh -c "
      npx prisma generate &&
      npx prisma migrate dev &&
      npx prisma db seed &&
      npm run dev "

  dashboard-dev:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: guantanamera-dashboard-dev
    restart: unless-stopped
    depends_on:
      - api-dev
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_ADMIN_API_KEY=${NEXT_PUBLIC_ADMIN_API_KEY:-${ADMIN_API_KEY:-your-admin-api-key}}
      - WATCHPACK_POLLING=true # Necesario para hot-reload en algunos sistemas Windows/WSL

volumes:
  postgres_data_dev:
